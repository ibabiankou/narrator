worker_processes  auto;

error_log  /dev/stdout notice;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time '
                      'cache_status=$upstream_cache_status';

    access_log  /dev/stdout  main;
    # Performance: Reduce TCP overhead when sending files.
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;

    # Performance: Cache processed thumbnail images on disk.
    proxy_cache_path /proxy_cache
                     levels=1:2
                     keys_zone=img_cache:10m
                     max_size=5g
                     inactive=30d
                     use_temp_path=off;

    # Performance: Cache file metadata.
    open_file_cache          max=10000 inactive=5m;
    open_file_cache_valid    2m;
    open_file_cache_min_uses 1;
    open_file_cache_errors   on;

    upstream imgproxy_backend {
        server imgproxy:8080;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        location /healthz {
            return 200 "OK";
        }

        location /img/ {
            rewrite ^/img/(.*) /$1 break;

            # There is little to none benefit to compress images.
            gzip off;

            # Ensure nginx handles all etag related headers.
            etag on;

            proxy_cache_revalidate on;

            # Security Settings
            # Hide the Nginx version number
            server_tokens off;
            # Prevent other sites from embedding images in a frame
            add_header X-Frame-Options "SAMEORIGIN";

            # Caching Settings
            proxy_cache          img_cache;
            proxy_cache_key      "$scheme$proxy_host$request_uri";
            proxy_cache_valid    200 30d;
            proxy_cache_valid    404 1m;

            # Resilience: Serve stale cache if imgproxy is down/slow
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock      on;

            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Forward Accept header to imgproxy so it can detect supported formats.
            proxy_set_header Accept $http_accept;

            add_header X-Cache-Status $upstream_cache_status;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://imgproxy_backend;
        }
    }
}
