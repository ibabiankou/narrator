<app-toolbar>
  <h1 center class="title">{{ title() }}</h1>
</app-toolbar>

<mat-sidenav-container>
  <mat-sidenav mode="side" opened>
    <app-toc
      [tocItems]="tocItems()!"
      [currentTocItemIndex]="currentItem"
      [allowSelection]="true"
      (currentItemChanged)="readium.navigate($event)"
    ></app-toc>
  </mat-sidenav>
  <mat-sidenav-content>
    <app-readium-epub
      #readium
      [publication]="publication()!"
      [toc]="tocItems()!"
      (currentItemChanged)="currentItem = $event"
    ></app-readium-epub>
  </mat-sidenav-content>
</mat-sidenav-container>

<div class="content-spacer"></div>

<div class="start-narration-footer">
  <button matButton="outlined"
          aria-label="Enqueue book for narration"
          (click)="startNarration()"
  >Start Narration</button>
</div>
