<app-toolbar>
  <h1 center class="title">{{ title() }}</h1>
</app-toolbar>

<mat-sidenav-container>
  <mat-sidenav mode="side" opened>
    <div class="toc">
      @for (item of tocItems(); track $index) {
        <div class="toc-item" [ngClass]="{'selected': $index == currentItem}" (click)="navigate($index)">
          <div><span class="title">{{item.title}}</span></div>
          <div>
            <mat-checkbox
              (click)="$event.stopPropagation();"
              (change)="toggleItem($index)"
              checked="{{item.narrate}}" />
          </div>
        </div>
      }
    </div>
  </mat-sidenav>
  <mat-sidenav-content>
    <app-readium-epub
      [publication]="publication()!"
      [toc]="tocItems()!"
      (currentItemChanged)="currentItem = $event"
      (toggleItem)="toggleItem($event)"
    ></app-readium-epub>
  </mat-sidenav-content>
</mat-sidenav-container>

<div class="content-spacer"></div>

<div class="start-narration-footer">
  <button matButton="outlined"
          aria-label="Enqueue book for narration"
  >Start Narration</button>
</div>
