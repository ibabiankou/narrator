<app-toolbar>
  <div center class="title">
    <button matIconButton
            aria-label="Toggle Table of Contents"
            (click)="toc.toggle()"
    >
      <mat-icon>list</mat-icon>
    </button>
    <a routerLink="/books/{{ bookId() }}">
      <h1>{{ title() }}</h1>
    </a>
  </div>
</app-toolbar>

<app-toc
  #toc
  [tocItems]="tocItems()!"
  [currentTocItemIndex]="currentItem"
  [showAll]="true"
  [startOpen]="true"
  [allowSelection]="true"
  (currentItemChanged)="readium.navigate($event)"
>
  <app-readium-epub
    #readium
    [publication]="publication()!"
    [toc]="tocItems()!"
    (currentItemChanged)="currentItem = $event"
  ></app-readium-epub>
</app-toc>

<div class="content-spacer"></div>

<div class="start-narration-footer">
  <button matButton="outlined"
          aria-label="Enqueue book for narration"
          (click)="startNarration()"
  >Start Narration
  </button>
</div>
