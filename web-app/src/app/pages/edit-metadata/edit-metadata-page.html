<app-toolbar>
  <div breadcrumb>
    <h1>Edit Book Details</h1>
  </div>
</app-toolbar>

<div class="main-container">
  @defer (when metadataForReview()) {
    <div class="metadata-container">
      <div class="cover-wrapper">
        @let book = metadataForReview()!.overview;
        @if (metadataForReview()!.overview.cover) {
          <img [src]="`/api/files/${ book.cover }` | fileAsBlob | async " alt="{{ book.title }}">
        } @else {
          <img src="covers/blue.png" alt="{{ book.title }}">
        }
      </div>

      <div class="form-wrapper">
        <app-book-details-form
          [bookMetadata]="metadataForReview()!.overview"
          (reviewedMetadata)="submitReviewMetadata($event)"
        ></app-book-details-form>
      </div>
    </div>
    <div>
      <pre>{{ metadataForReview() | json }}</pre>
    </div>
  }
</div>
