<app-toolbar appHideIdle>
  <div center class="title">
    @defer (when bookDetails()) {
      <button matIconButton
              aria-label="Toggle Table of Contents"
              (click)="showToC = !showToC"
      >
        <mat-icon>list</mat-icon>
      </button>
      <a routerLink="/books/{{ bookId() }}">
        <h1>{{ bookDetails()!.title }}</h1>
      </a>
      <button matIconButton
              aria-label="Copy book title"
              (click)="copyBookTitle(); tooltip.show(10);"
              #tooltip="matTooltip"
              matTooltip="Copied!"
              matTooltipPosition="right"
              matTooltipShowDelay="10000"
              matTooltipHideDelay="2000">
        <mat-icon>content_copy</mat-icon>
      </button>
    } @placeholder (minimum 250ms) {
      <app-skeleton height="1.5rem"/>
    }
  </div>
  <div actionButton>
    @defer (when bookDetails()) {
      <app-book-menu [bookOverview]="bookDetails()!"></app-book-menu>
    }
  </div>
</app-toolbar>

<app-toc
  appHideIdle hideClass="hide-cursor"
  [tocItems]="tocItems()!"
  [currentTocItemIndex]="currentItem"
  [showToC]="showToC"
>
  <app-readium-epub
    [publication]="publication()!"
    [toc]="tocItems()!"
    (currentItemChanged)="currentItem = $event"
  ></app-readium-epub>
</app-toc>

@defer (when bookDetails()) {
  @if (BookStatus.ge(bookDetails()!.status, BookStatus.narrating)) {
    <app-player appHideIdle
                [bookDetails]="bookDetails()!"
                (fragmentChanged)="fragmentChanged($event)"
    ></app-player>
  }
}
