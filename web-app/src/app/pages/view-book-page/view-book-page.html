<app-toolbar appHideIdle>
  <div breadcrumb class="title">
    @defer (when bookDetails()) {
      <a routerLink="/books/{{ bookId() }}">
        <h1>{{ bookDetails()!.title }}</h1>
      </a>
      <button matIconButton
              aria-label="Copy book title"
              (click)="copyBookTitle(); tooltip.show(10);"
              #tooltip="matTooltip"
              matTooltip="Copied!"
              matTooltipPosition="right"
              matTooltipShowDelay="10000"
              matTooltipHideDelay="2000">
        <mat-icon>content_copy</mat-icon>
      </button>
    } @placeholder (minimum 250ms) {
      <app-skeleton height="1.5rem"/>
    }
  </div>
  <div actionButton>
    @defer (when bookDetails()) {
      <app-book-menu [bookOverview]="bookDetails()!"
                     [bookStats]=""></app-book-menu>
    }
  </div>
</app-toolbar>

<div class="main-container" appHideIdle hideClass="hide-cursor">
  <app-readium-epub
    [publication]="publication()!"
    [toc]="tocItems()!"
  ></app-readium-epub>
</div>
@defer (when bookDetails()) {
  @if (BookStatus.ge(bookDetails()!.status, BookStatus.narrating)) {
    <app-player appHideIdle [bookDetails]="bookDetails()!"></app-player>
  }
}
