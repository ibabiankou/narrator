<mat-toolbar>
  <a matIconButton aria-label="Home" routerLink="/books">
    <mat-icon>home</mat-icon>
  </a>

  <ng-content select="[breadcrumb]"></ng-content>
  <div class="center">
    <ng-content select="[center]"></ng-content>
  </div>
  <ng-content select="[actionButton]"></ng-content>

  <button matIconButton aria-label="Account menu" [matMenuTriggerFor]="menu">
    <mat-icon>person</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #menu="matMenu">
  @defer (when settings()) {
    <div class="toggle-buttons" (click)="$event.stopPropagation()">
      <mat-button-toggle-group name="themeMode" aria-label="Theme Mode" [value]="settings()!['theme']">
        <mat-button-toggle value="light" (click)="setTheme('light')">
          <mat-icon>light_mode</mat-icon>
        </mat-button-toggle>
        <mat-button-toggle value="dark" (click)="setTheme('dark')">
          <mat-icon>dark_mode</mat-icon>
        </mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  }

   <button *appRenderIf="'desktop'" mat-menu-item aria-label="Keyboard Shortcuts" (click)="openKeyboardShortcuts()">
    <mat-icon>keyboard</mat-icon>
    <span>Keyboard Shortcuts</span>
  </button>

  <button mat-menu-item aria-label="Logout" (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>
</mat-menu>

<div class="content-spacer"></div>
