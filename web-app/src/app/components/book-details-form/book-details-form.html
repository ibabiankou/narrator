<mat-card class="metadata-card" appearance="outlined">
  <mat-card-content>
    <mat-form-field>
      <mat-label>Title</mat-label>
      <input matInput placeholder="Title" [value]="title">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Series</mat-label>
      <input matInput placeholder="Series" [value]="series">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Description</mat-label>
      <textarea matInput placeholder="Description" rows="6" [value]="description || ''"></textarea>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Authors</mat-label>
      <mat-chip-grid #authorsChipGrid>
        @for (author of authors; track author) {
          <mat-chip-row>
            {{ author }}
            <button matChipRemove>
              <mat-icon>cancel</mat-icon>
            </button>
          </mat-chip-row>
        }
      </mat-chip-grid>
      <input
        placeholder="New author..."
        [matChipInputFor]="authorsChipGrid"
      />
    </mat-form-field>
    <mat-form-field>
      <mat-label>ISBNs</mat-label>
      <mat-chip-grid #isbnsChipGrid>
        @for (isbn of isbns; track isbn) {
          <mat-chip-row>
            {{ isbn }}
            <button matChipRemove>
              <mat-icon>cancel</mat-icon>
            </button>
          </mat-chip-row>
        }
      </mat-chip-grid>
      <input
        placeholder="New ISBN..."
        [matChipInputFor]="isbnsChipGrid"
      />
    </mat-form-field>

  </mat-card-content>
  <mat-card-actions>
    <button matButton>Continue</button>
  </mat-card-actions>
</mat-card>
