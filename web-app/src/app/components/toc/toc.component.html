<div class="toc">
  @for (item of tocItems(); track $index) {
    <div class="toc-item" [ngClass]="{'selected': $index == currentTocItemIndex()}" (click)="itemClicked($index)">
      <div><span class="title">{{item.title}}</span></div>
      @if (allowSelection()) {
        <div>
          <mat-checkbox
            (click)="$event.stopPropagation();"
            (change)="toggleItem($index)"
            checked="{{item.narrate}}" />
        </div>
      }
    </div>
  }
</div>
