<div class="book-cover-container">
  @if (bookMetadata().cover) {
    @if (bookMetadata().cover!.startsWith('http')) {
      <img [src]="bookMetadata().cover" alt="cover" />
    } @else {
      <img [src]="`/api/files/${ bookMetadata().cover }` | fileAsBlob | async " alt="cover" />
    }
  } @else {
    <img src="covers/gray.png" alt="cover" [style]="!bookMetadata().cover ? tintStyle : {}" />
  }
  <div class="overlay">
    @if (authors().length > 0) {
      <div class="authors">{{ authors().join(', ') }}</div>
    }
    @if (title()) {
      <div class="title">{{ title() }}</div>
    }
    @if (description()) {
      <div class="description">{{ description() }}</div>
    }
    @if (isbns().length > 0) {
      <div class="isbns">{{ isbns().join(', ') }}</div>
    }
  </div>
</div>
