<div class="book-overview-container">
  <div class="cover-container">
    @if (hasCover()) {
      <img ngSrc="{{bookMetadata().cover}}" fill alt="cover"/>
    } @else {
      <img ngSrc="covers/gray.png" fill alt="cover" [style]="!bookMetadata().cover ? tintStyle : {}"/>
    }
    <div class="overlay">
      @if (authors().length > 0) {
        <div class="authors">{{ authors().join(', ') }}</div>
      }
      @if (title()) {
        <div class="title">{{ title() }}</div>
      }
    </div>
  </div>
</div>
