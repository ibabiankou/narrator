<div class="content-spacer"></div>
<div class="player-container">
  <div class="progress">
    <div class="current-time">{{ nowTime$ | async }}</div>
    <div class="slider">
      <div class="now"
           (mousedown)="onSliderClick($event)"
           (touchstart)="onSliderClick($event)"
           [style]="{ width: (nowPercent$ | async) + '%' }"></div>
      <div class="available"
           #slider
           (mousedown)="onSliderClick($event)"
           (touchstart)="onSliderClick($event)"
           [style]="{ width: (availablePercent$ | async) + '%' }"></div>
      <div class="unavailable" [style]="{ width: (unavailablePercent$ | async) + '%' }"></div>
      <div class="drag-handle"
           [style]="{ left: (nowPercent$ | async) + '%' }"
           (mousedown)="onDragStart($event)"
           (touchstart)="onDragStart($event)"></div>
      <div class="chapter-ticks">
        @for (tick of chapterTicks(); track $index) {
          <div class="chapter-tick"
               [style]="{ left: (tick.startPercent * 100) + '%' }"
               [ngClass]="{ past: tick.isPast, future: !tick.isPast }"
          ></div>
        }
      </div>
    </div>
    <div class="remaining-time">{{ remainingTime$ | async }}</div>
  </div>

  <div id="controls">
    <div class="main-controls controls">
      <button matIconButton (click)="previous($event)">
        <mat-icon>skip_previous</mat-icon>
      </button>
      <button matIconButton (click)="replay($event)">
        <mat-icon>replay_5</mat-icon>
      </button>
      <button matIconButton class="play-pause" (click)="playPause($event)">
        @if (isPlaying$ | async) {
          <mat-icon>pause</mat-icon>
        } @else {
          <mat-icon>play_arrow</mat-icon>
        }
      </button>
      <button matIconButton (click)="forward($event)">
        <mat-icon>forward_5</mat-icon>
      </button>
      <button matIconButton (click)="next($event)">
        <mat-icon>skip_next</mat-icon>
      </button>
    </div>

    <div class="controls chapter-title-wrapper" *appRenderIf="'desktop'">
      <h3 class="chapter-title">{{ chapterTitle() }}</h3>
    </div>

    <div class="controls">
      <button matIconButton aria-label="Playback settings"
              [matMenuTriggerFor]="playbackSettingsMenu"
              #playbackSettingsMenuTrigger="matMenuTrigger">
        <mat-icon>settings</mat-icon>
      </button>
      <button matIconButton aria-label="Toggle Full Screen Mode" (click)="toggleFullScreen()">
        @if (isFullScreen()) {
          <mat-icon>fullscreen_exit</mat-icon>
        } @else {
          <mat-icon>fullscreen</mat-icon>
        }
      </button>

      <mat-menu #playbackSettingsMenu="matMenu" class="playback-settings-menu">
        <button mat-menu-item>
          <mat-icon>sync_arrow_down</mat-icon>
          <span>Read Along</span>
          <mat-slide-toggle (click)="$event.stopPropagation();toggleSync()"
                            [checked]="syncCurrentSection()"></mat-slide-toggle>
        </button>

        <button mat-menu-item class="playback-speed">
          <mat-icon>speed</mat-icon>
          <button matIconButton (click)="$event.stopPropagation();adjustPlaybackRate(-0.05)">
            <mat-icon>remove</mat-icon>
          </button>
          <span class="value">x{{ (playbackRate$ | async | number : '1.1-2') }}</span>
          <button matIconButton (click)="$event.stopPropagation();adjustPlaybackRate(+0.05)">
            <mat-icon>add</mat-icon>
          </button>
        </button>
      </mat-menu>
    </div>

  </div>
</div>
