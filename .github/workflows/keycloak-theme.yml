name: Keycloak Theme

on:
  push:
    branches: [ "main" ]
    paths:
      - 'keycloak-theme/**'
      - '.github/workflows/keycloak-theme.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: "ubuntu-24.04"
            arch: "amd64"
            image_repo: "ibabiankou/home-lab"
            python-version: "3.13"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: keycloak-theme
          path: keycloak-theme/**
